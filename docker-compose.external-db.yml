# External MySQL Configuration for Dokploy
# Use this when deploying to Dokploy with an external MySQL server
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.external-db.yml up -d
#
# Environment Variables Required:
#   DB_HOST: External MySQL host (e.g., your-mysql-server.com)
#   DB_PORT: MySQL port (default: 3306)
#   DB_DATABASE: Database name
#   DB_USERNAME: Database user
#   DB_PASSWORD: Database password

services:
  app:
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    # Override dependencies - remove mysql, keep redis
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    # Nginx config remains the same, just ensure it depends on app
    depends_on:
      app:
        condition: service_healthy

  queue:
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    # Override dependencies - remove mysql, keep app and redis
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Explicitly disable internal MySQL service
  mysql:
    profiles:
      - disabled
