[phases.setup]
nixPkgs = [
  "php83",
  "php83Packages.composer",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "nodejs_20",
  "nginx"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
]

[phases.build]
cmds = [
  "npm ci",
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]
